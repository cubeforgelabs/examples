name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      # Checkout both repos as siblings so path aliases resolve correctly.
      # cubeforge-examples/platformer/vite.config.ts points to ../../cubeforge/packages
      - uses: actions/checkout@v4
        with:
          path: cubeforge-examples

      - uses: actions/checkout@v4
        with:
          repository: 1homsi/cubeforge
          path: cubeforge

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install
        working-directory: cubeforge-examples

      - name: Build examples
        run: |
          mkdir -p site
          for example in platformer mario-clone breakout flappy-bird shooter top-down; do
            echo "▶ Building $example..."
            cd cubeforge-examples/$example
            bunx vite build --base=/cubeforge-examples/${example}/
            cd ../..
            cp -r cubeforge-examples/$example/dist site/$example
          done

      - name: Create root index
        run: |
          cat > site/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>Cubeforge Examples</title>
            <style>
              *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
              body {
                background: #0d0f1a;
                color: #e0e0e0;
                font-family: "Courier New", monospace;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                padding: 60px 24px;
              }
              header { text-align: center; margin-bottom: 56px; }
              header h1 { font-size: 28px; font-weight: 900; color: #fff; letter-spacing: 4px; }
              header p { margin-top: 12px; font-size: 13px; color: #546e7a; letter-spacing: 1.5px; }
              header a { color: #4fc3f7; text-decoration: none; }
              header a:hover { text-decoration: underline; }
              .grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                gap: 20px;
                width: 100%;
                max-width: 960px;
              }
              .card {
                background: #12151f;
                border: 1px solid #1e2535;
                border-radius: 10px;
                padding: 28px 24px;
                text-decoration: none;
                color: inherit;
                transition: border-color 0.15s, transform 0.15s;
                display: block;
              }
              .card:hover { border-color: #4fc3f7; transform: translateY(-2px); }
              .card h2 { font-size: 16px; font-weight: 700; color: #fff; letter-spacing: 2px; margin-bottom: 10px; }
              .card p { font-size: 12px; color: #546e7a; line-height: 1.7; }
              .card .tag {
                display: inline-block;
                margin-top: 16px;
                font-size: 10px;
                letter-spacing: 2px;
                color: #4fc3f7;
                border: 1px solid #1e3a4a;
                border-radius: 4px;
                padding: 3px 8px;
              }
              footer { margin-top: 64px; font-size: 11px; color: #263238; letter-spacing: 2px; }
              footer a { color: #37474f; text-decoration: none; }
              footer a:hover { color: #546e7a; }
            </style>
          </head>
          <body>
            <header>
              <h1>CUBEFORGE EXAMPLES</h1>
              <p>
                Runnable games built with <a href="https://github.com/1homsi/cubeforge">Cubeforge</a>
                — a React-first 2D browser game engine.
              </p>
            </header>

            <div class="grid">
              <a class="card" href="./platformer/" target="_blank" rel="noopener">
                <h2>PLATFORMER</h2>
                <p>Scrolling platformer with double jump, coyote time, enemy stomp, coins, and lives.</p>
                <span class="tag">WASD / SPACE</span>
              </a>
              <a class="card" href="./mario-clone/" target="_blank" rel="noopener">
                <h2>MARIO CLONE</h2>
                <p>Question blocks, mushroom powerup, goombas, goal flag, and a scrolling 1800px level.</p>
                <span class="tag">WASD / SPACE</span>
              </a>
              <a class="card" href="./breakout/" target="_blank" rel="noopener">
                <h2>BREAKOUT</h2>
                <p>Classic brick breaker — 60 bricks, paddle angle control, 3 lives.</p>
                <span class="tag">A / D</span>
              </a>
              <a class="card" href="./flappy-bird/" target="_blank" rel="noopener">
                <h2>FLAPPY BIRD</h2>
                <p>Tap to flap through scrolling pipe pairs. Tracks your session high score.</p>
                <span class="tag">SPACE / CLICK</span>
              </a>
              <a class="card" href="./shooter/" target="_blank" rel="noopener">
                <h2>SHOOTER</h2>
                <p>Side-scrolling shoot-em-up with 5 waves, 3 enemy patterns, and a star field.</p>
                <span class="tag">W / S / SPACE</span>
              </a>
              <a class="card" href="./top-down/" target="_blank" rel="noopener">
                <h2>TOP-DOWN</h2>
                <p>Dungeon explorer — 4-directional combat, 8 keys to collect, exit door.</p>
                <span class="tag">WASD / SPACE</span>
              </a>
            </div>

            <footer>
              <a href="https://github.com/1homsi/cubeforge">github.com/1homsi/cubeforge</a>
            </footer>
          </body>
          </html>
          EOF

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - uses: actions/deploy-pages@v4
        id: deployment
