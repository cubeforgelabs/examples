name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: pnpm install

      - name: Build examples
        run: |
          mkdir -p site
          for example in platformer mario-clone breakout flappy-bird shooter top-down pong snake endless-runner asteroids playground sokoban rpg tower-defense roguelike multiplayer 2048 minesweeper lights-out tetris pac-man match-3 twin-stick vampire-survivors angry-birds solitaire rhythm idle game-of-life tic-tac-toe whack-a-mole simon memory-card connect-4 sliding-puzzle checkers blackjack; do
            echo "▶ Building $example..."
            cd $example
            pnpm exec vite build --base=/cubeforge-examples/${example}/
            cd ..
            cp -r $example/dist site/$example
          done

      - name: Create root index
        run: cp index.html site/index.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - uses: actions/deploy-pages@v4
        id: deployment
